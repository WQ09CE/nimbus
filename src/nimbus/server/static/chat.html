<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid #0f3460;
        }
        header h1 {
            font-size: 1.5rem;
            color: #e94560;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            line-height: 1.5;
        }
        .message.user {
            align-self: flex-end;
            background: #0f3460;
            border-bottom-right-radius: 0.25rem;
        }
        .message.assistant {
            align-self: flex-start;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-bottom-left-radius: 0.25rem;
        }
        .message.tool {
            align-self: flex-start;
            background: #0a1628;
            border: 1px solid #e94560;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            max-width: 90%;
        }
        .message pre {
            background: #0a0a15;
            padding: 0.5rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .message code {
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
        }
        #input-container {
            background: #16213e;
            padding: 1rem;
            border-top: 1px solid #0f3460;
        }
        #input-form {
            display: flex;
            gap: 0.5rem;
            max-width: 800px;
            margin: 0 auto;
        }
        #message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #0f3460;
            border-radius: 0.5rem;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
            outline: none;
        }
        #message-input:focus {
            border-color: #e94560;
        }
        #send-btn {
            padding: 0.75rem 1.5rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        #send-btn:hover {
            background: #ff6b6b;
        }
        #send-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 0.5rem;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #e94560;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .status {
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            padding: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🌩️ Nimbus Chat</h1>
    </header>
    
    <div id="chat-container"></div>
    
    <div id="input-container">
        <form id="input-form">
            <input 
                type="text" 
                id="message-input" 
                placeholder="Type your message..." 
                autocomplete="off"
            />
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const inputForm = document.getElementById('input-form');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        
        const messages = [];
        let isStreaming = false;
        
        function addMessage(role, content, isToolCall = false) {
            const div = document.createElement('div');
            div.className = `message ${role}${isToolCall ? ' tool' : ''}`;
            div.innerHTML = formatContent(content);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }
        
        function formatContent(content) {
            // Basic markdown-like formatting
            return content
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }
        
        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typing';
            div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
        
        async function sendMessage(userMessage) {
            if (!userMessage.trim() || isStreaming) return;
            
            isStreaming = true;
            sendBtn.disabled = true;
            
            // Add user message
            messages.push({ role: 'user', content: userMessage });
            addMessage('user', userMessage);
            messageInput.value = '';
            
            showTyping();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: messages.map(m => ({
                            role: m.role,
                            content: m.content
                        }))
                    })
                });
                
                hideTyping();
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMessage = '';
                let assistantDiv = null;
                let currentToolDiv = null;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        
                        try {
                            const data = JSON.parse(line.slice(6));
                            
                            // Handle AI SDK v6 protocol events
                            if (data.type === 'text-delta' && data.textDelta) {
                                if (!assistantDiv) {
                                    assistantDiv = addMessage('assistant', '');
                                }
                                assistantMessage += data.textDelta;
                                assistantDiv.innerHTML = formatContent(assistantMessage);
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }
                            else if (data.type === 'tool-call') {
                                const toolInfo = `🔧 ${data.toolName}(${JSON.stringify(data.args, null, 2)})`;
                                currentToolDiv = addMessage('assistant', toolInfo, true);
                            }
                            else if (data.type === 'tool-result' && currentToolDiv) {
                                const result = typeof data.result === 'string' 
                                    ? data.result 
                                    : JSON.stringify(data.result, null, 2);
                                currentToolDiv.innerHTML += '\n\n📤 ' + formatContent(result.slice(0, 500));
                                if (result.length > 500) {
                                    currentToolDiv.innerHTML += '...';
                                }
                            }
                            else if (data.type === 'error') {
                                addMessage('assistant', '❌ Error: ' + (data.errorText || 'Unknown error'));
                            }
                        } catch (e) {
                            // Ignore parse errors for incomplete chunks
                        }
                    }
                }
                
                if (assistantMessage) {
                    messages.push({ role: 'assistant', content: assistantMessage });
                }
                
            } catch (error) {
                hideTyping();
                addMessage('assistant', '❌ Error: ' + error.message);
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }
        
        inputForm.addEventListener('submit', (e) => {
            e.preventDefault();
            sendMessage(messageInput.value);
        });
        
        // Focus input on load
        messageInput.focus();
        
        // Add welcome message
        addMessage('assistant', 'Hello! I\'m Nimbus, your AI coding assistant. How can I help you today?');
    </script>
</body>
</html>
