# Nimbus Nginx 配置
# 放置在: /usr/local/etc/nginx/servers/nimbus.conf (macOS Homebrew)
#         或 /etc/nginx/sites-available/nimbus (Linux)

upstream nimbus_api {
    server 127.0.0.1:4096;
}

upstream nimbus_webui {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name erqing.wang;

    # 日志
    access_log /var/log/nginx/nimbus-access.log;
    error_log /var/log/nginx/nimbus-error.log;

    # API 后端 (SSE 支持)
    location /api/ {
        proxy_pass http://nimbus_api/;
        proxy_http_version 1.1;
        
        # SSE 必需配置
        proxy_set_header Connection '';
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        
        # 超时配置（长连接）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web UI
    location / {
        proxy_pass http://nimbus_webui;
        proxy_http_version 1.1;
        
        # WebSocket 支持 (Next.js HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://nimbus_api/health;
        access_log off;
    }
}

