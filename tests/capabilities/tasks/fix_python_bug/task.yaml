# Fix Python Bug - Debug and fix a simple bug
instruction: |
  The file calculator.py has a bug in the divide function.
  It should handle division by zero gracefully, but currently it crashes.
  
  Fix the bug so that:
  1. Division by zero returns None instead of crashing
  2. Normal division still works correctly
  
  Do not change the function signature or other functions.

difficulty: easy
category: bug_fixing
timeout_sec: 90.0

workspace_files:
  calculator.py: |
    """Simple calculator module."""
    
    def add(a: float, b: float) -> float:
        """Add two numbers."""
        return a + b
    
    def subtract(a: float, b: float) -> float:
        """Subtract b from a."""
        return a - b
    
    def multiply(a: float, b: float) -> float:
        """Multiply two numbers."""
        return a * b
    
    def divide(a: float, b: float) -> float:
        """Divide a by b. Should return None if b is zero."""
        return a / b  # BUG: crashes on division by zero
