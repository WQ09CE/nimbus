# Find and Fix Bug - Locate and fix a bug in existing code
instruction: |
  The file binary_search.py implements a binary search function, 
  but it has a subtle bug that causes it to fail on some inputs.
  
  Your task:
  1. Read the binary_search.py file
  2. Analyze the code to find the bug (hint: check the boundary conditions)
  3. Fix the bug using the Edit tool
  
  The function should:
  - Return the index of the target in a sorted list
  - Return -1 if the target is not found
  - Handle edge cases (empty list, single element, etc.)
  
  After fixing, use return_result to confirm the fix is complete.
  Note: There are no test files in this workspace - just fix the code directly.

difficulty: medium
category: bug_fixing
timeout_sec: 120.0

workspace_files:
  binary_search.py: |
    """Binary search implementation with a bug."""
    
    def binary_search(arr: list, target: int) -> int:
        """
        Search for target in sorted array.
        Returns index if found, -1 otherwise.
        """
        if not arr:
            return -1
        
        left = 0
        right = len(arr)  # BUG: should be len(arr) - 1
        
        while left <= right:
            mid = (left + right) // 2
            
            if arr[mid] == target:
                return mid
            elif arr[mid] < target:
                left = mid + 1
            else:
                right = mid - 1
        
        return -1
