# Implement Function - Write a function from specification
instruction: |
  Create a file called fizzbuzz.py with a function called fizzbuzz.
  
  The function should:
  - Take an integer n as input
  - Return a list of strings from 1 to n where:
    - Numbers divisible by 3 are replaced with "Fizz"
    - Numbers divisible by 5 are replaced with "Buzz"  
    - Numbers divisible by both 3 and 5 are replaced with "FizzBuzz"
    - Other numbers are converted to strings
  
  Example:
    fizzbuzz(5) returns ["1", "2", "Fizz", "4", "Buzz"]
    fizzbuzz(15) returns ["1", "2", "Fizz", "4", "Buzz", "Fizz", "7", "8", "Fizz", "Buzz", "11", "Fizz", "13", "14", "FizzBuzz"]

difficulty: easy
category: implementation
timeout_sec: 90.0
