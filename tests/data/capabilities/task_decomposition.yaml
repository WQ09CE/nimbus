# Task Decomposition Test Cases
# Golden dataset for testing task decomposition capability

version: "1.0"
capability: task_decomposition
description: Test cases for verifying task decomposition accuracy

test_cases:
  # ==========================================================================
  # Simple Tasks (No Decomposition)
  # ==========================================================================
  - id: simple_greeting_en
    input: "hello"
    description: "English greeting should not be decomposed"
    expected_task_count: 1
    expected_skills:
      - chat

  - id: simple_greeting_cn
    input: "你好"
    description: "Chinese greeting should not be decomposed"
    expected_task_count: 1
    expected_skills:
      - chat

  - id: simple_thanks
    input: "thank you"
    description: "Thanks should not be decomposed"
    expected_task_count: 1
    expected_skills:
      - chat

  # ==========================================================================
  # Search Tasks (Single Skill)
  # ==========================================================================
  - id: simple_search_en
    input: "search Python tutorials"
    description: "Simple search should be single task"
    expected_task_count: 1
    expected_skills:
      - search

  - id: simple_search_cn
    input: "search machine learning basics"
    description: "Chinese search should be single task"
    expected_task_count: 1
    expected_skills:
      - search

  # ==========================================================================
  # Multi-Step Tasks (Decomposition Required)
  # ==========================================================================
  - id: search_and_summarize_en
    input: "search Python tutorials, then summarize"
    description: "Search + summarize should decompose into 2 tasks"
    expected_task_count: 2
    expected_skills:
      - search
      - summarize
    expected_dependencies:
      - ["summarize", "search"]  # summarize depends on search

  - id: search_and_summarize_cn
    input: "search AI trends, then summarize results"
    description: "Chinese search + summarize pattern"
    min_task_count: 2
    expected_skills:
      - search
      - summarize

  # ==========================================================================
  # Code Exploration Tasks
  # ==========================================================================
  - id: read_single_file
    input: "read src/main.py"
    description: "Reading single file should be one task"
    expected_task_count: 1
    expected_skills:
      - Read

  - id: list_files
    input: "list all Python files"
    description: "Listing files should be one task"
    expected_task_count: 1
    expected_skills:
      - Glob

  - id: grep_pattern
    input: "search for 'def main'"
    description: "Pattern search should use Grep"
    expected_task_count: 1
    expected_skills:
      - Grep

  # ==========================================================================
  # Complex Multi-Step Tasks
  # ==========================================================================
  - id: analyze_and_report
    input: "Analyze the codebase structure and generate a summary report"
    description: "Complex analysis should decompose into multiple steps"
    min_task_count: 2
    expected_skills:
      - Glob
      - chat

  - id: read_then_summarize
    input: "Read README.md and summarize it"
    description: "Read + summarize should be 2 tasks"
    min_task_count: 2
    expected_skills:
      - Read
      - summarize
    expected_dependencies:
      - ["summarize", "Read"]

# ==========================================================================
# Expected Behaviors
# ==========================================================================
behaviors:
  no_decomposition:
    - "Simple greetings (hello, hi, thanks)"
    - "Single skill requests (search X, read Y)"

  two_step_decomposition:
    - "'X, then Y' patterns"
    - "'X and summarize' patterns"

  multi_step_decomposition:
    - "Analysis requests"
    - "Report generation"
    - "Multi-file operations"
