# Code Summarization Test Cases
# Golden dataset for testing code summarization capability

version: "1.0"
capability: code_summarization
description: Test cases for verifying code summarization quality

test_cases:
  # ==========================================================================
  # File Summary Tests
  # ==========================================================================
  - id: file_summary_complete
    description: "Complete file summary covering all key aspects"
    code_type: module
    required_mentions:
      - "data processing"
      - "filtering"
      - "transformation"
      - "pipeline"
    min_coverage: 0.75

  - id: file_summary_brief
    description: "Brief file summary within length limit"
    code_type: module
    max_length: 200
    required_mentions:
      - "module"
      - "functions"

  # ==========================================================================
  # Function Understanding Tests
  # ==========================================================================
  - id: function_fibonacci
    description: "Understand Fibonacci function"
    code: |
      def fibonacci(n: int) -> int:
          if n <= 1:
              return n
          return fibonacci(n-1) + fibonacci(n-2)
    expected_params:
      - "n"
    expected_return: "int"
    required_mentions:
      - "Fibonacci"
      - "recursive"

  - id: function_async
    description: "Understand async function"
    code: |
      async def fetch_data(url: str, timeout: int = 30) -> dict:
          async with aiohttp.get(url, timeout=timeout) as response:
              return await response.json()
    expected_params:
      - "url"
      - "timeout"
    expected_return: "dict"
    required_mentions:
      - "async"
      - "fetch"

  - id: function_no_params
    description: "Function with no parameters"
    code: |
      def get_timestamp() -> float:
          return time.time()
    expected_params: []
    expected_return: "float"

  # ==========================================================================
  # Class Understanding Tests
  # ==========================================================================
  - id: class_simple
    description: "Understand simple class"
    code: |
      class Counter:
          def __init__(self):
              self.count = 0

          def increment(self):
              self.count += 1

          def get_value(self) -> int:
              return self.count
    expected_methods:
      - "increment"
      - "get_value"
    expected_attributes:
      - "count"

  - id: class_inheritance
    description: "Understand class with inheritance"
    code: |
      class Animal:
          def speak(self):
              pass

      class Dog(Animal):
          def speak(self):
              return "Woof!"
    expected_methods:
      - "speak"
    required_mentions:
      - "inheritance"
      - "Animal"
      - "Dog"

  - id: class_complex
    description: "Understand complex class"
    code: |
      class DatabaseManager:
          def __init__(self, connection_string: str):
              self.conn_str = connection_string
              self._connection = None

          def connect(self) -> bool:
              self._connection = create_connection(self.conn_str)
              return self._connection is not None

          def execute(self, query: str) -> list:
              return self._connection.execute(query)

          def close(self):
              if self._connection:
                  self._connection.close()
    expected_methods:
      - "connect"
      - "execute"
      - "close"
    expected_attributes:
      - "conn_str"
      - "_connection"

  # ==========================================================================
  # Hallucination Detection Tests
  # ==========================================================================
  - id: no_hallucination_function
    description: "Summary should not invent features"
    code: |
      def add(a, b):
          return a + b
    forbidden_mentions:
      - "subtract"
      - "multiply"
      - "divide"
      - "async"
      - "decorator"

  - id: no_hallucination_class
    description: "Summary should not invent methods"
    code: |
      class Stack:
          def __init__(self):
              self.items = []

          def push(self, item):
              self.items.append(item)

          def pop(self):
              return self.items.pop()
    forbidden_mentions:
      - "queue"
      - "enqueue"
      - "dequeue"
      - "sort"
      - "search"

  - id: no_hallucination_module
    description: "Summary should not claim non-existent features"
    code: |
      import math

      def calculate_area(radius):
          return math.pi * radius ** 2
    forbidden_mentions:
      - "volume"
      - "perimeter"
      - "3D"
      - "sphere"

# ==========================================================================
# Expected Behaviors
# ==========================================================================
behaviors:
  accuracy:
    - "Identify main purpose of code"
    - "List key functions/methods"
    - "Describe parameters and return types"

  no_hallucination:
    - "Never claim features not in code"
    - "Don't invent methods or attributes"
    - "Stick to observable facts"

  conciseness:
    - "Summaries should be brief but complete"
    - "Prioritize most important information"
    - "Respect length constraints"

# ==========================================================================
# Scoring Weights
# ==========================================================================
weights:
  coverage: 0.4
  no_hallucination: 0.3
  function_understanding: 0.15
  class_understanding: 0.15
