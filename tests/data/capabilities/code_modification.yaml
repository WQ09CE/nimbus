# Code Modification Test Cases
# Golden dataset for testing code modification capability

version: "1.0"
capability: code_modification
description: Test cases for verifying code modification correctness

test_cases:
  # ==========================================================================
  # Add Function Tests
  # ==========================================================================
  - id: add_simple_function
    description: "Add a simple function to a module"
    original_code: |
      def existing():
          return 42
    modification: "Add a function 'double' that doubles its input"
    expected_changes:
      - "def double"
      - "return"
    preserve_patterns:
      - "def existing"
      - "return 42"

  - id: add_method_to_class
    description: "Add a method to an existing class"
    original_code: |
      class Calculator:
          def add(self, a, b):
              return a + b
    modification: "Add a multiply method"
    expected_changes:
      - "def multiply"
      - "return a * b"
    preserve_patterns:
      - "class Calculator"
      - "def add"

  # ==========================================================================
  # Edit Function Tests
  # ==========================================================================
  - id: edit_return_value
    description: "Modify a function's return value"
    original_code: |
      def greet(name):
          return f"Hello, {name}"
    modification: "Change to uppercase greeting"
    expected_changes:
      - "upper()"
    preserve_patterns:
      - "def greet"
      - "name"

  - id: edit_add_parameter
    description: "Add a parameter to existing function"
    original_code: |
      def process(data):
          return data.strip()
    modification: "Add optional 'lowercase' parameter"
    expected_changes:
      - "lowercase"
    preserve_patterns:
      - "def process"
      - "data"

  # ==========================================================================
  # Syntax Validity Tests
  # ==========================================================================
  - id: valid_python_after_edit
    description: "Modified code must be valid Python"
    language: python
    original_code: |
      def foo():
          pass
    modification: "Add implementation"
    syntax_must_be_valid: true

  - id: preserve_indentation
    description: "Indentation must be preserved correctly"
    original_code: |
      class MyClass:
          def method(self):
              if True:
                  return 1
              return 0
    modification: "Add else clause"
    preserve_patterns:
      - "class MyClass"
      - "def method"

  # ==========================================================================
  # Minimal Change Tests
  # ==========================================================================
  - id: minimal_single_line
    description: "Single line change should have high minimal_change score"
    original_code: |
      line 1
      line 2
      line 3
      line 4
      line 5
    modification: "Change only line 3"
    min_unchanged_ratio: 0.8

  - id: minimal_targeted_edit
    description: "Targeted edit should not affect other code"
    original_code: |
      # Header comment
      import os

      def function_a():
          pass

      def function_b():
          pass
    modification: "Edit only function_a"
    preserve_patterns:
      - "# Header"
      - "import os"
      - "def function_b"

  # ==========================================================================
  # Edge Cases
  # ==========================================================================
  - id: edit_unicode_content
    description: "Handle Unicode content correctly"
    original_code: |
      message = "Hello World"
    modification: "Support Chinese"
    expected_changes:
      - "message"

  - id: edit_empty_file
    description: "Adding to empty file"
    original_code: ""
    modification: "Add main function"
    expected_changes:
      - "def main"

  - id: preserve_encoding_comments
    description: "Preserve encoding declarations"
    original_code: |
      # -*- coding: utf-8 -*-

      def old():
          pass
    modification: "Add new function"
    preserve_patterns:
      - "# -*- coding: utf-8 -*-"

# ==========================================================================
# Forbidden Changes (Security)
# ==========================================================================
forbidden_patterns:
  - "import os; os.system"
  - "exec("
  - "eval("
  - "__import__"
  - "subprocess.call"
  - "rm -rf"

# ==========================================================================
# Expected Behaviors
# ==========================================================================
behaviors:
  syntax_validity:
    - "All modifications must produce syntactically valid code"
    - "Compile check for Python, syntax check for other languages"

  minimal_change:
    - "Prefer editing over rewriting"
    - "Only modify targeted lines"
    - "Preserve comments and formatting"

  safety:
    - "Never introduce shell execution"
    - "Never add eval/exec"
    - "Preserve security-sensitive code unchanged"
