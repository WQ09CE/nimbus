# Code Search Test Cases
# Golden dataset for testing code search capability

version: "1.0"
capability: code_search
description: Test cases for verifying code search precision and tool selection

test_cases:
  # ==========================================================================
  # Grep Pattern Search
  # ==========================================================================
  - id: grep_function_def
    input: "search for 'def main'"
    description: "Search for function definition pattern"
    expected_tool: Grep
    expected_params:
      pattern: "def main"
    relevant_files:
      - src/main.py
      - tests/test_main.py

  - id: grep_class_def
    input: "find 'class Agent'"
    description: "Search for class definition"
    expected_tool: Grep
    expected_params:
      pattern: "class Agent"
    relevant_files:
      - src/nimbus/core/agent.py

  - id: grep_import
    input: "search 'import asyncio'"
    description: "Search for import statement"
    expected_tool: Grep
    expected_params:
      pattern: "import asyncio"

  - id: grep_chinese
    input: "search for 'CodeAgent' definition"
    description: "Search with Chinese pattern"
    expected_tool: Grep

  # ==========================================================================
  # Glob File Search
  # ==========================================================================
  - id: glob_python_files
    input: "list all Python files"
    description: "List all .py files"
    expected_tool: Glob
    expected_params:
      pattern: "*.py"

  - id: glob_directory
    input: "list files in src/"
    description: "List files in specific directory"
    expected_tool: Glob
    expected_params:
      path: "src"

  - id: glob_test_files
    input: "find all test files"
    description: "Find test_*.py files"
    expected_tool: Glob
    expected_params:
      pattern: "test_*.py"

  # ==========================================================================
  # Read Specific File
  # ==========================================================================
  - id: read_file_path
    input: "read src/main.py"
    description: "Read specific file by path"
    expected_tool: Read
    expected_params:
      file_path: "src/main.py"

  - id: read_readme
    input: "show README.md"
    description: "Read README file"
    expected_tool: Read
    expected_params:
      file_path: "README.md"

  # ==========================================================================
  # Complex Search Scenarios
  # ==========================================================================
  - id: multi_pattern_search
    input: "find all async functions"
    description: "Search for async def pattern"
    expected_tool: Grep
    expected_params:
      pattern: "async def"

  - id: search_in_directory
    input: "search for 'import' in tests/"
    description: "Search pattern in specific directory"
    expected_tool: Grep
    expected_params:
      pattern: "import"
      path: "tests"

# ==========================================================================
# Tool Selection Rules
# ==========================================================================
tool_selection_rules:
  Grep:
    - Pattern-based content search
    - "search for X"
    - "find X in code"
    - "grep X"

  Glob:
    - File listing/finding
    - "list files"
    - "find files"
    - "ls"
    - "show directory"

  Read:
    - Specific file content
    - "read X.py"
    - "show X.py"
    - "cat X.py"
    - "view X.py"

# ==========================================================================
# Precision/Recall Test Data
# ==========================================================================
search_evaluation:
  - id: agent_search
    query: "class CodeAgent"
    relevant_files:
      - src/nimbus/core/agent.py
    irrelevant_files:
      - src/nimbus/core/planner.py
      - tests/test_agent.py

  - id: planner_search
    query: "class PlannerPipeline"
    relevant_files:
      - src/nimbus/core/planner/pipeline.py
    irrelevant_files:
      - src/nimbus/core/agent.py

  - id: test_search
    query: "def test_"
    relevant_files:
      - tests/test_agent.py
      - tests/test_planner.py
      - tests/test_tools_grep.py
    irrelevant_files:
      - src/nimbus/core/agent.py
