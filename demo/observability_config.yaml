# Observability Demo Configuration
observability:
  tracing:
    enabled: true
    sample_rate: 1.0
    export_format: "json"
  
  metrics:
    enabled: true
    collectors:
      - name: "tool_call_duration"
        type: "histogram"
        unit: "milliseconds"
      - name: "tool_call_count"
        type: "counter"
  
  logging:
    level: "DEBUG"
    structured: true
    fields:
      - "trace_id"
      - "span_id"
      - "operation"
